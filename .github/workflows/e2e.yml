name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: speculo
          POSTGRES_PASSWORD: speculo
          POSTGRES_DB: speculo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://speculo:speculo@localhost:5432/speculo
      JWT_SECRET: ci-jwt-secret-for-e2e-tests-min32chars
      JWT_EXPIRY_DAYS: 7
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'ci-admin-password-123' }}
      BASE_URL: http://localhost:5173
      ADMIN_EMAIL: admin@example.com
      TEST_USER_EMAIL: e2e-user@speculo.test
      TEST_USER_PASSWORD: e2e-test-user-password-123

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @speculo/e2e exec playwright install --with-deps chromium

      - name: Start application (API + Web)
        run: pnpm dev &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          JWT_EXPIRY_DAYS: ${{ env.JWT_EXPIRY_DAYS }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}

      - name: Wait for servers to be ready
        # http://localhost:3000/health only responds after migrations complete (server.ts starts after runStartup())
        run: npx wait-on http://localhost:3000/health http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: pnpm --filter @speculo/e2e test
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 30
