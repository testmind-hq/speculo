services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: speculo
      POSTGRES_PASSWORD: speculo
      POSTGRES_DB: speculo
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speculo"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://speculo:speculo@db:5432/speculo
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS:-7}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
